<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RouteLore</title>
<meta name="description" content="RouteLore — place-anchored oral history, played back where it happened.">
<style>
  :root {
    color-scheme: light dark;
    --bg: #fdfcf9;
    --fg: #1c1a17;
    --muted: #6b6660;
    --accent: #8a5a34;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14120f;
      --fg: #f2efe9;
      --muted: #a39c92;
      --accent: #d69a63;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  main {
    max-width: 32rem;
    text-align: center;
  }
  h1 {
    font-size: 2.5rem;
    letter-spacing: -0.02em;
    margin: 0 0 0.75rem;
    color: var(--accent);
  }
  p.tagline {
    font-size: 1.15rem;
    line-height: 1.5;
    color: var(--fg);
    margin: 0 0 2.5rem;
  }
  footer {
    font-size: 0.9rem;
    color: var(--muted);
  }
  footer a {
    color: inherit;
  }
</style>
</head>
<body>
<main>
  <h1>RouteLore</h1>
  <p class="tagline">Place-anchored oral history, played back where it happened.</p>
  <footer>
    <p>Contact: <a href="mailto:tennis@svwllc.com">tennis@svwllc.com</a></p>
    <p>&copy; 2026 SVW LLC</p>
  </footer>
</main>
</body>
</html>
